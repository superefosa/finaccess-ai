services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finaccess
      POSTGRES_USER: finaccess
      POSTGRES_PASSWORD: finaccess
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finaccess -d finaccess"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+pg8000://finaccess:finaccess@db:5432/finaccess
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:5173
      MODEL_PATH: /app/model/credit_model.joblib
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ai/model:/app/model
    ports:
      - "8000:8000"
    command: sh -c "PYTHONPATH=. alembic upgrade head && PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data: